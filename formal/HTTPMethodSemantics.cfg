\* TLC model configuration for HTTPMethodSemantics
\*
\* Bounded instance: 2 resources, 3 values, 6 operations
\* State space: manageable for exhaustive model checking

CONSTANTS
    Methods = {"GET", "PUT", "POST", "DELETE"}
    MaxOps = 6
    ResourceIds = {"r1", "r2"}

SPECIFICATION Spec

\* Type invariant
INVARIANT TypeOK

\* RFC 9110 §9.2.1: Safe methods preserve state
PROPERTY SafeMethodsPreserveState

\* RFC 9110 §9.2.2: PUT converges to same state
PROPERTY IdempotentPUTConverges

\* These SHOULD produce counterexamples (violations):
\* Uncomment one at a time to generate counterexample traces.
\*
\* PROPERTY StatusCodeIdempotency_SHOULD_FAIL
\* PROPERTY StatusCodeIdempotencyDELETE_SHOULD_FAIL
\* PROPERTY POSTIsIdempotent_SHOULD_FAIL
