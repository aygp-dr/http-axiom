\* TLC model configuration for ShrinkTermination
\*
\* Bounded instance: 4 headers, repeat up to 5
\* State space: 5 * 4 * 3 * 2 * 5 * 2 = 1200 states (tractable)

CONSTANTS
    MaxHeaders = 4
    MaxRepeat = 5
    AuthLadder = 0
    OriginLadder = 0

SPECIFICATION Spec

\* Type invariant
INVARIANT TypeOK

\* Complexity strictly decreases on every accepted step
PROPERTY ComplexityDecreases

\* Total steps bounded by initial complexity
INVARIANT BoundedSteps

\* Shrinking eventually terminates
PROPERTY EventuallyDone
